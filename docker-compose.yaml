version: "3.9"

services:
  db:
    image: mysql:8.4.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: TurboJosianne
      MYSQL_USER: josianne
      MYSQL_PASSWORD: turbo
    volumes:
      - db_data:/var/lib/mysql
      - ./dossierConception/SQL/ScriptCreationBDD.sql:/docker-entrypoint-initdb.d/ScriptCreationBDD.sql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - db
    restart: always
    ports:
      - "9080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: TurboJosianne

  api:
    image: yamashifenikkusu/harmogestiondocker-api
    depends_on:
      - db
    ports:
      - "9002:9002"
    environment:
      HARMOGESTION_DB_USERNAME: josianne
      HARMOGESTION_DB_PASSWORD: turbo
      HARMOGESTION_DB_DBNAME: jdbc:mysql://db:3306/harmogestiondb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "9003:9003"
    environment:
      API_URL: http://api:9002

volumes:
  db_data:
